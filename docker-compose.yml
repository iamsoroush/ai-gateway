services:
  ai-gateway:
    build: .
    container_name: ai-gateway
    ports:
      # Host 8081 -> container 8080 (host 8080 is often taken by other dev tools).
      - "8081:8080"
    env_file:
      - .env
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8080 --reload
